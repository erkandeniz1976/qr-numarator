<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. URL'den 'id' parametresini güvenli bir şekilde oku
    const urlParams = new URLSearchParams(window.location.search);
    let currentId = urlParams.get('id');

    // DOM Elementlerini Tanımla (Kendi ID isimlerinize göre kontrol edin)
    const loadingScreen = document.getElementById("loading-screen") || document.getElementById("loading-element");
    const mainContent = document.getElementById("main-content") || document.getElementById("app-container");

    // 2. Güvenlik ve Zaman Aşımı (Timeout) mekanizması
    // Uzak sunucu veya veritabanı yanıt vermezse 5 saniye sonra zorla ekranı açar
    let forceOpenTimeout = setTimeout(() => {
        if (loadingScreen && loadingScreen.style.display !== "none") {
            console.warn("Sunucu bağlantısı gecikti. Sistem yerel modda zorla açılıyor.");
            initSystem(currentId);
        }
    }, 5000); // 5 saniye bekleme süresi

    // 3. ID Kontrolü ve Başlatma Fonksiyonu
    function initSystem(id) {
        clearTimeout(forceOpenTimeout); // Zaman aşımını iptal et
        
        if (loadingScreen) loadingScreen.style.display = "none"; // Yükleniyor ekranını gizle
        if (mainContent) mainContent.style.display = "block";   // Ana paneli göster

        console.log("Sistem Aktif ID:", id);
        
        // Eğer projenizde kurulumu tetikleyen özel bir fonksiyon varsa buraya ekleyin
        // Örn: checkUserStatusInDatabase(id);
    }

    // 4. Ana Çalıştırma Mantığı
    if (currentId) {
        // ID varsa hemen sistemi başlat (veya veritabanı sorgunuzun içine entegre edin)
        initSystem(currentId);
    } else {
        // Eğer URL'de hiç ID yoksa kullanıcıyı uyar veya Toplu Üretim alanını doğrudan göster
        if (loadingScreen) {
            loadingScreen.innerHTML = "<h3>⚠️ Hata: QR Kod Kimliği (ID) Eksik!</h3><p>Lütfen barkodun tam linkini tarattığınızdan emin olun.</p>";
        }
    }
});
</script>
