<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Premium Numaratör Pro</title>
    <style>
        /* Basit ve şık arayüz stilleri */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        #loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; top:0; left:0; width:100%; height:100%; background:#ffffff; z-index: 9999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #main-content { display: none; max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { display: inline-block; background: #2ecc71; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; text-decoration: none; margin-top: 15px; }
        .info-box { background: #e8f4fd; padding: 15px; border-radius: 5px; margin: 15px 0; font-size: 14px; color: #2c3e50; }
    </style>
</head>
<body>

    <!-- 1. YÜKLENİYOR EKRANI (Hatanın Yaşandığı Alan) -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 id="loading-status" style="margin-top: 20px; color: #34495e;">QR Premium</h2>
        <p id="loading-sub" style="color: #7f8c8d;">ID: Kontrol Ediliyor... Yükleniyor...</p>
    </div>

    <!-- 2. ANA PANEL / KURULUM EKRANI (Açılması Gereken Alan) -->
    <div id="main-content">
        <h2 style="color: #2c3e50;">🚀 Akıllı QR Numaratör Kurulumu</h2>
        <div class="info-box">
            <strong>Aktif Etiket Kimliği (ID):</strong> <span id="display-id" style="color: #e74c3c; font-weight: bold;">Tanımlanmadı</span>
        </div>
        <p>Bu akıllı QR etiket henüz aktifleştirilmemiş. Müşterinizin kendi profilini oluşturması için aşağıdaki butondan kuruluma başlayın.</p>
        
        <!-- Satış Sonrası Müşterinin Göreceği Kurulum Butonu -->
        <button class="btn" onclick="startSetup()">Etiketi Kur ve Aktif Et</button>
    </div>

    <!-- 3. HATASIZ ENTEGRE JAVASCRIPT KODU -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // URL'deki ?id=... parametresini yakala
        const urlParams = new URLSearchParams(window.location.search);
        let currentId = urlParams.get('id');

        // DOM Elementlerini Değişkenlere Ata
        const loadingScreen = document.getElementById("loading-screen");
        const loadingSub = document.getElementById("loading-sub");
        const mainContent = document.getElementById("main-content");
        const displayId = document.getElementById("display-id");

        // ⚠️ ZAMAN AŞIMI GÜVENLİĞİ: Sunucu yanıt vermezse 3 saniye sonra ekranı zorla açar
        let safetyTimeout = setTimeout(() => {
            if (loadingScreen.style.display !== "none") {
                console.warn("Zaman aşımı! Sistem yerel modda başlatılıyor.");
                bypassLoading(currentId || "GECICI-ID");
            }
        }, 3000);

        // Yükleme ekranını kapatıp ana içeriği gösteren fonksiyon
        function bypassLoading(validId) {
            clearTimeout(safetyTimeout); // Zaman sayacını durdur
            loadingScreen.style.display = "none"; // Yükleniyor yazısını tamamen kaldır
            mainContent.style.display = "block"; // Kurulum panelini görünür yap
            displayId.innerText = validId; // Ekrana PRO-1001 yazdır
        }

        // Ana Kontrol Mekanizması
        if (currentId) {
            // ID varsa yükleme aşamalarını simüle et ve hızlıca içeriğe geç
            loadingSub.innerText = "ID Doğrulandı: " + currentId;
            
            // Eğer Firebase/Veritabanı kodu ekleyecekseniz sorguyu buraya yazın.
            // Biz burada doğrudan sistemi güvenli şekilde açıyoruz:
            setTimeout(() => {
                bypassLoading(currentId);
            }, 800); // 0.8 saniye doğrulama efekti göster ve aç
            
        } else {
            // URL'de id parametresi hiç yoksa hata mesajı bas ve kilitlenmeyi önle
            clearTimeout(safetyTimeout);
            document.querySelector(".spinner").style.display = "none";
            loadingStatus.innerText = "⚠️ Geçersiz Erişim";
            loadingSub.innerHTML = "Bu sayfaya doğrudan erişemezsiniz.<br>Lütfen üzerinde <strong>QR Kod ID'si</strong> olan bir link kullanın.<br>Örnek: <em>?id=PRO-1001</em>";
        }
    });

    // Kurulum Buton Fonksiyonu
    function startSetup() {
        alert("Kurulum işlemi başlatıldı! Müşteri buraya telefon numarasını ve 4 haneli PIN kodunu girerek aktifleştirecek.");
        // Buraya kendi orijinal projenizdeki kurulum fonksiyonlarını (localStorage.setItem vb.) bağlayabilirsiniz.
    }
    </script>
</body>
</html>
