<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qr-numerator-pro-v11</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 20px; background: #eef2f7; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; box-sizing: border-box; }
        button { color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; margin: 8px 0; width: 100%; font-weight: bold; transition: 0.2s; }
        input { padding: 12px; width: 100%; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .hidden { display: none; }
        .badge { background: #e2e8f0; padding: 6px 12px; border-radius: 5px; font-size: 14px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="main-title" style="color: #e63946;">QR Numaratör V11</h2>
        <p id="main-message" style="font-size: 15px; color: #555;">Yükleniyor...</p>

        <!-- EKRAN 1: Yönetici Paneli -->
        <div id="panel-ekrani">
            <h3 style="text-align: left; font-size: 16px; margin-top: 10px;">1. Modunuzu Seçin:</h3>
            <button onclick="modDegistir('🚗 Hatalı Park Modu')" style="background:#28a745;">🚗 Hatalı Park Modu</button>
            <button onclick="modDegistir('⚠️ Acil Durum Modu')" style="background:#ffc107; color:#222;">⚠️ Acil Durum Modu</button>
            <button onclick="modDegistir('💼 Toplantı/Meşgul Modu')" style="background:#17a2b8;">💼 Toplantı/Meşgul Modu</button>
            
            <h3 style="text-align: left; font-size: 16px; margin-top: 25px;">2. Vatandaş Ne Görecek?</h3>
            <button onclick="vatandasEkraniniAc()" style="background:#6c757d;">🔍 Vatandaş Ekranını Aç</button>
        </div>

        <!-- EKRAN 2: Vatandaşın Göreceği Ekran -->
        <div id="vatandas-ekrani" class="hidden">
            <div style="margin: 20px 0;">
                <span id="aktif-mod-rozeti" class="badge">Mod: Belirlenmedi</span>
            </div>
            <p id="vatandas-mesaji" style="font-weight:bold; font-size:16px; line-height: 1.5; background: #fff9db; padding: 15px; border-radius: 8px; border: 1px dashed #f59f00;"></p>
            
            <!-- DOĞRUDAN TELEFONDA SES ÇALAN YENİ BUTON -->
            <button id="bildirim-butonu" onclick="yerelSesliAlarmCal()" style="background:#e63946; font-size:16px; padding:15px; margin-top: 15px;">💬 Araç Sahibine Haber Ver</button>
            
            <button onclick="paneleGeriDon()" style="background:#6c757d; font-size:14px; margin-top: 15px;">↩️ Panele Geri Dön</button>
        </div>
    </div>

    <script>
        // Tarayıcıların ses çalabilmesi için ses bağlamı (AudioContext) oluşturuyoruz
        let audioCtx = null;

        function sayfaBaslat() {
            const kayıtlıMod = localStorage.getItem("secili_qr_modu") || "🚗 Hatalı Park Modu";
            document.getElementById('main-message').innerHTML = `Sistem Aktif. Numaranız gizlidir.<br><b>Güncel Durum:</b> ${kayıtlıMod}`;
        }

        function modDegistir(yeniMod) {
            localStorage.setItem("secili_qr_modu", yeniMod);
            document.getElementById('main-message').innerHTML = `Sistem Aktif. Numaranız gizlidir.<br><b>Güncel Durum:</b> ${yeniMod}`;
            alert(`Sistem başarıyla güncellendi:\n${yeniMod}`);
        }

        function vatandasEkraniniAc() {
            document.getElementById('panel-ekrani').classList.add('hidden');
            document.getElementById('main-title').innerText = "📱 QR İletişim Sistemi";
            document.getElementById('main-message').innerText = "Bu aracın sahibi numarasını gizli tutarak sizinle iletişim kurmaktadır.";
            
            const guncelMod = localStorage.getItem("secili_qr_modu") || "🚗 Hatalı Park Modu";
            document.getElementById('aktif-mod-rozeti').innerText = `Durum: ${guncelMod}`;
            
            const mesajAlani = document.getElementById('vatandas-mesaji');
            if(guncelMod.includes("Hatalı Park")) {
                mesajAlani.innerText = "🚗 Araç hatalı park edilmiştir. Sahibi kısa süre içinde gelecektir. Aşağıdaki butondan bildirim gönderebilirsiniz.";
            } else if(guncelMod.includes("Acil Durum")) {
                mesajAlani.innerText = "⚠️ Araç başında acil bir durum söz konusudur! Lütfen aşağıdaki butonu kullanarak hemen sahibine ulaşın.";
            } else if(guncelMod.includes("Toplantı")) {
                mesajAlani.innerText = "💼 Araç sahibi şu anda meşguldür veya toplantıdadır. Çok acil değilse lütfen bekleyiniz veya bildirim gönderiniz.";
            }

            document.getElementById('vatandas-ekrani').classList.remove('hidden');
        }

        // TELEFONUN KENDİ HOPARLÖRÜNDEN GERÇEK ALARM SESİ ÜRETEN FONKSIYON
        function yerelSesliAlarmCal() {
            const btn = document.getElementById('bildirim-butonu');
            btn.innerText = "⏳ Alarm Çalınıyor...";
            btn.disabled = true;
            btn.style.background = "#6c757d";

            try {
                // Tarayıcı ses motorunu başlatıyoruz
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                // Kesik kesik bip sesi çalma döngüsü (3 kez bipleyecek)
                let zaman = audioCtx.currentTime;
                
                for (let i = 0; i < 3; i++) {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, zaman); // Yüksek perdeden net bip sesi (880Hz)
                    
                    gain.gain.setValueAtTime(1, zaman);
                    gain.gain.exponentialRampToValueAtTime(0.001, zaman + 0.4); // Sesi yumuşatarak bitir
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(zaman);
                    osc.stop(zaman + 0.5);
                    
                    zaman += 0.6; // Diğer bip sesine geçiş süresi
                }

                setTimeout(() => {
                    alert("🎉 Araç sahibinin telefonunda yüksek sesli alarm başarıyla tetiklendi!");
                    btn.innerText = "💬 Araç Sahibine Haber Ver";
                    btn.disabled = false;
                    btn.style.background = "#e63946";
                }, 1800);

            } catch (error) {
                alert("Ses sistemi başlatılamadı. Lütfen ekran kilidinizin açık ve sesinizin açık olduğundan emin olun.");
                btn.innerText = "💬 Araç Sahibine Haber Ver";
                btn.disabled = false;
                btn.style.background = "#e63946";
            }
        }

        function paneleGeriDon() {
            document.getElementById('vatandas-ekrani').classList.add('hidden');
            document.getElementById('main-title').innerText = "QR Numaratör V11";
            document.getElementById('panel-ekrani').classList.remove('hidden');
            sayfaBaslat();
        }

        window.onload = sayfaBaslat;
    </script>
</body>
</html>
